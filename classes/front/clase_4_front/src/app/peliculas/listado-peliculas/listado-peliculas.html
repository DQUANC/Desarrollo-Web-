<div class="page">
  <h1 class="titulo-pagina">Cartelera</h1>

  <div class="grid">
    @for (pelicula of arregloPeliculas; track pelicula.id) {
      <a class="card" [routerLink]="['/pelicula', pelicula.id]">
        <div class="poster-wrapper">
          <img [src]="pelicula.poster" [alt]="pelicula.titulo" class="poster" />
          <span class="precio-badge">{{ pelicula.precio | currency:'GTQ':'symbol':'1.0-0' }}</span>
        </div>
        <div class="info">
          <h2 class="titulo">{{ pelicula.titulo }}</h2>
          <p class="fecha">{{ pelicula.fechaLanzamiento | date:'mediumDate' }}</p>
        </div>
      </a>
    }
  </div>
</div>
